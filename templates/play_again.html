<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Play Again?</title>
  <style>
    @media (max-width: 600px) {
      body {
        margin-top: 60px !important;
        padding: 0 12px !important;
      }
      h2 {
        font-size: 2.5rem !important;
        margin: 16px 0 !important;
      }
      p {
        font-size: 1.8rem !important;
        margin: 16px 0 !important;
      }
      .button {
        font-size: 2rem !important;
        padding: 14px 24px !important;
        margin: 16px !important;
        min-height: 52px !important;
        width: 80% !important;
      }
    }
    @media (max-width: 500px) {
      body {
        margin-top: 50px !important;
      }
      h2 {
        font-size: 2.2rem !important;
      }
      p {
        font-size: 1.6rem !important;
      }
      .button {
        font-size: 1.8rem !important;
        padding: 12px 20px !important;
        min-height: 50px !important;
        width: 85% !important;
      }
    }
    @media (max-width: 380px) {
      body {
        margin-top: 40px !important;
        padding: 0 8px !important;
      }
      h2 {
        font-size: 1.8rem !important;
      }
      p {
        font-size: 1.4rem !important;
      }
      .button {
        font-size: 1.6rem !important;
        padding: 10px 18px !important;
        margin: 12px !important;
        min-height: 48px !important;
        width: 90% !important;
      }
    }
  </style>
</head>
<body style="font-family: Arial, sans-serif; text-align: center; margin-top: 100px; color: #333;">
  <h2 style="margin: 0; padding: 0; font-family: Arial, sans-serif; color: #333;">🎉 {{ winner }} wins FixIt!</h2>
  <p style="margin: 0; padding: 0; font-family: Arial, sans-serif; color: #333; line-height: 1.5;">Would you like to play again?</p>
  <form method="get" action="{{ url_for('restart_game') }}" style="display: inline-block; margin: 20px;">
    <button class="button" style="margin: 20px; padding: 10px 20px; font-size: 18px; background-color: #007BFF; color: white; border: none; border-radius: 5px; cursor: pointer;">Yes</button>
  </form>
  <form method="get" action="{{ url_for('end_game') }}" style="display: inline-block; margin: 20px;">
    <button class="button" style="margin: 20px; padding: 10px 20px; font-size: 18px; background-color: #007BFF; color: white; border: none; border-radius: 5px; cursor: pointer;">No</button>
  </form>
</body>
</html>
