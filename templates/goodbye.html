<html>

  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    @media (max-width: 600px) {
      h1 {
        font-size: 2rem !important;

      }

  <h1 style="margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; color: #333; text-align: center;">Thanks for playing FixIt 🎉</h1>
