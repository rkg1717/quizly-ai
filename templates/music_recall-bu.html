<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Recall // Pro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        :root {
            --slate: #1e293b;
            --cobalt: #38bdf8;
            --glass: rgba(255, 255, 255, 0.05);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body { 
            background-color: #0f172a; 
            color: var(--text-main); 
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start; 
            min-height: 100vh;
            padding: 20px 0;
            overflow-y: auto;
        }

        .container { 
            max-width: 600px; 
            width: 90%;
            border: 1px solid rgba(255,255,255,0.1); 
            background: var(--slate); 
            border-radius: 12px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            padding: 20px 30px 30px 30px; 
        }

        .genre-nav {
            display: flex;
            overflow-x: auto;
            white-space: nowrap;
            gap: 12px;
            margin-bottom: 25px;
            padding: 5px 0 15px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            scrollbar-width: none;
        }

        .genre-nav::-webkit-scrollbar { display: none; }

        .genre-link {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            color: var(--text-dim);
            cursor: pointer;
            transition: 0.3s;
            padding: 6px 15px;
            border-radius: 20px;
            background: rgba(255,255,255,0.05);
            flex-shrink: 0;
            text-decoration: none;
        }

        .genre-link:hover { color: white; background: rgba(255,255,255,0.15); }
        .genre-link.active { color: white; background: var(--cobalt); }

        .reveal-box {
            background: var(--glass);
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.4s ease;
        }

        .sticky-guess {
            background: #020617 !important; /* Deepest blue for contrast */
            border: 2px solid #10b981 !important; /* Emerald Green Action Border */
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.2); 
            margin-top: 5px !important;
            z-index: 10;
        }
		/* 1. Brighten the 'Artist or Song name...' placeholder text */
		#user-guess::placeholder {
			color: rgba(255, 255, 255, 0.6); /* Brighter light-grey */
			font-style: italic;
			opacity: 1; /* Ensures Firefox doesn't dim it */
		}

		/* 2. Style the actual input box and the text you type */
		#user-guess {
			color: #ffffff !important; /* Pure white text when typing */
			background: #1e293b;
			border: 1px solid #334155;
			padding: 12px;
			border-radius: 6px;
			font-size: 1.1rem;
			outline: none;
			width: 100%;
		}

		/* 3. Add a highlight when you click inside the box */
		#user-guess:focus {
			border-color: #38bdf8; /* Cobalt blue glow on focus */
			background: #26334a;
		}

        .label { 
            font-size: 0.7rem; 
            text-transform: uppercase; 
            letter-spacing: 0.15em; 
            color: var(--cobalt); 
            margin-bottom: 12px;
            font-weight: 800;
        }

        .beat-text { 
            font-family: 'Monaco', 'Courier New', monospace; 
            font-size: 1.1rem; 
            color: #cbd5e1;
            line-height: 1.5;
        }

        .btn-primary { 
            background: var(--cobalt); 
            color: #0f172a; 
            padding: 14px 24px; 
            border-radius: 6px; 
            font-weight: 700; 
            border: none; 
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            transition: transform 0.1s;
        }

        .btn-primary:disabled { background: #475569; cursor: not-allowed; opacity: 0.5; }

        .btn-secondary {
            background: transparent;
            color: var(--text-dim);
            border: 1px solid #475569;
            margin-top: 12px;
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .hidden { display: none; opacity: 0; }
        #answer-box { border-left: 4px solid var(--cobalt); background: rgba(56, 189, 248, 0.05); }
    </style>
</head>
<body>
<div class="container">
    <h2 style="margin-top: 0; font-weight: 800; letter-spacing: -0.02em; text-align: center;">Music Recall</h2>
    
    <div class="genre-nav">
        <a href="#" class="genre-link active" onclick="setGenre(event, this, 'Country')">COUNTRY</a>
        <a href="#" class="genre-link" onclick="setGenre(event, this, 'Rock')">ROCK</a>
        <a href="#" class="genre-link" onclick="setGenre(event, this, 'Jazz')">JAZZ</a>
        <a href="#" class="genre-link" onclick="setGenre(event, this, 'R&B')">R&B</a>
        <a href="#" class="genre-link" onclick="setGenre(event, this, 'Latin')">LATIN</a>
        <a href="#" class="genre-link" onclick="setGenre(event, this, 'Folk')">FOLK</a>
        <a href="#" class="genre-link" onclick="setGenre(event, this, 'Pop')">POP</a>
        <a href="#" class="genre-link" onclick="setGenre(event, this, 'Hip-Hop')">HIP-HOP</a>
        <a href="#" class="genre-link" onclick="setGenre(event, this, 'Classical')">CLASSICAL</a>
    </div>

    <div class="genre-nav" id="decade-nav">
        <a href="#" class="genre-link active" onclick="setDecade(event, this, 'Random')">RANDOM</a>
        <a href="#" class="genre-link" onclick="setDecade(event, this, '1950s')">50s</a>
        <a href="#" class="genre-link" onclick="setDecade(event, this, '1960s')">60s</a>
        <a href="#" class="genre-link" onclick="setDecade(event, this, '1970s')">70s</a>
        <a href="#" class="genre-link" onclick="setDecade(event, this, '1980s')">80s</a>
        <a href="#" class="genre-link" onclick="setDecade(event, this, '1990s')">90s</a>
        <a href="#" class="genre-link" onclick="setDecade(event, this, '2000s')">00s</a>
        <a href="#" class="genre-link" onclick="setDecade(event, this, '2010s')">10s</a>
    </div>

<div id="game-board">
    <div class="reveal-box">
        <div class="label">Rhythmic Signature</div>
        <div id="beat-display" class="beat-text">ANALYZING...</div>
    </div>

    <div id="stage-2" class="reveal-box hidden">
        <div class="label">The Lowdown</div>
        <div id="lowdown-display"></div>
    </div>

    <div id="stage-3" class="reveal-box hidden">
        <div class="label">Lyric Fragment (or lead instrument)</div>
        <div id="lyric-display" style="font-size: 1.1rem; font-style: italic;"></div>
    </div>

    <div id="answer-box" class="reveal-box hidden" style="margin-bottom: 10px;">
        <div class="label">Identity Confirmed</div>
        <div id="song-answer" style="font-size: 1.4rem; font-weight: 800;"></div>
        <div id="artist-details" style="color: var(--text-dim);"></div>
    </div>

    <div style="display: flex; justify-content: space-between; margin: 0 5px 10px 5px; font-weight: 800;">
        <span style="color: var(--text-dim);">SCORE: <span id="player-score" style="color: var(--cobalt);">0</span></span>
        <span style="color: var(--text-dim);">STREAK: <span id="player-streak" style="color: #10b981;">0</span></span>
    </div>

    <div id="feedback-text" style="font-weight: 800; text-align: center; margin-bottom: 10px; font-size: 2rem;"></div>

    <div id="guess-section" class="reveal-box sticky-guess" style="margin-top: 0;">
        <div class="label" style="color: #10b981; margin-bottom: 8px;">READY TO RECALL? (<span id="pts-display">100</span> PTS)</div>
        <div style="display: flex; gap: 10px; align-items: center;">
            <input type="text" id="user-guess" placeholder="Artist or Song name..." 
                   style="flex-grow: 1; background: #1e293b; border: 1px solid #334155; padding: 12px; border-radius: 6px; color: white; font-size: 1.1rem; outline: none;">
            <button id="submit-btn" onclick="checkGuess()" 
                    style="background: #10b981; color: #020617; border: none; padding: 12px 20px; border-radius: 6px; font-weight: 900; cursor: pointer; text-transform: uppercase;">
                SUBMIT
            </button>
        </div>
    </div>

    <div style="margin-top: 20px; text-align: center;">
        <button id="clue-btn" onclick="handleClueRequest()" class="btn-primary" style="display: block; margin: 0 auto 10px auto;">
            NEED A CLUE (Next Value: 75 pts)
        </button>
        <button id="reveal-btn" onclick="giveUp()" class="btn-secondary" style="display: none; border-color: #ef4444; color: #ef4444; margin-bottom: 10px;">
            I GIVE UP (0 PTS)
        </button>
        <button id="next-btn" onclick="loadNewSong()" class="btn-secondary" style="display: none; margin: 0 auto;">
            NEXT TRACK
        </button>
    </div>
</div>

<script>
    let currentStage = 1;
    let selectedGenre = 'Country';
    let selectedDecade = 'Random';
    let score = 0;
    let streak = 0;
    let pointsPossible = 100; 
    let currentSongData = {};

    document.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            const guessInput = document.getElementById('user-guess');
            if (document.activeElement === guessInput) {
                checkGuess();
            }
        }
    });

    function setGenre(event, element, genre) {
        if (event) event.preventDefault(); 
        document.querySelectorAll('.genre-nav:not(#decade-nav) .genre-link').forEach(el => el.classList.remove('active'));
        element.classList.add('active');
        selectedGenre = genre;
        loadNewSong();
    }

    function setDecade(event, element, decade) {
        if (event) event.preventDefault(); 
        document.querySelectorAll('#decade-nav .genre-link').forEach(el => el.classList.remove('active'));
        element.classList.add('active');
        selectedDecade = decade;
        loadNewSong();
    }

async function loadNewSong() {
    // 1. Force Reset State
    currentStage = 1;
    pointsPossible = 100;
    
    // 2. Clean UI immediately
    document.getElementById('pts-display').innerText = "100";
    document.getElementById('clue-btn').innerText = "NEED A CLUE (Next Value: 75 pts)";
    document.getElementById('clue-btn').disabled = false;
    document.getElementById('clue-btn').style.display = "block";
    document.getElementById('next-btn').style.display = "none";
    document.getElementById('reveal-btn').style.display = "none";
    
    // Clear the 'extra box' by emptying the feedback
    const feedback = document.getElementById('feedback-text');
    feedback.innerText = "";
    feedback.style.minHeight = "0"; 

    // Hide all clue boxes from the previous round
    document.getElementById('stage-2').classList.add('hidden');
    document.getElementById('stage-3').classList.add('hidden');
    document.getElementById('answer-box').classList.add('hidden');
    
    document.getElementById('beat-display').innerText = "ANALYZING...";

    // 3. Fetch data
    try {
        const response = await fetch('/get_music_turn', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ genre: selectedGenre, decade: selectedDecade }) 
        });
        currentSongData = await response.json();
        
        document.getElementById('beat-display').innerText = currentSongData.Beat;
        document.getElementById('lowdown-display').innerText = currentSongData.Lowdown;
        document.getElementById('lyric-display').innerText = `"${currentSongData.Lyric}"`;
        document.getElementById('song-answer').innerText = currentSongData.Song;
        document.getElementById('artist-details').innerText = `${currentSongData.Artist} (${currentSongData.Year})`;
    } catch (e) {
        document.getElementById('beat-display').innerText = "FETCH ERROR. TRY AGAIN.";
    }
}

function handleClueRequest() {
        if (currentStage >= 4) return;
        currentStage++;
        if (currentStage === 2) {
            pointsPossible = 75; 
            document.getElementById('stage-2').classList.remove('hidden');
            document.getElementById('stage-2').style.opacity = 1;
            document.getElementById('clue-btn').innerText = "NEED ANOTHER CLUE? (Value: 50 pts)";
        } 
        else if (currentStage === 3) {
            pointsPossible = 50;
            document.getElementById('stage-3').classList.remove('hidden');
            document.getElementById('stage-3').style.opacity = 1;
            document.getElementById('clue-btn').innerText = "HEAR AUDIO SNIPPET? (Value: 25 pts)";
        }
		else if (currentStage === 4) {
			pointsPossible = 25;
			if (currentSongData.Song && currentSongData.Artist) {
				const song = encodeURIComponent(currentSongData.Song);
				const artist = encodeURIComponent(currentSongData.Artist);
				
				fetch(`/get_audio_clue/${song}/${artist}`)
					.then(res => res.json())
					.then(data => {
						if (data.url) {
							const audio = new Audio(data.url);
							audio.play();
							
							// Auto-stop/fade after 8 seconds
							setTimeout(() => {
								let fade = setInterval(() => {
									if (audio.volume > 0.1) {
										audio.volume -= 0.1;
									} else {
										audio.pause();
										clearInterval(fade);
									}
								}, 100);
							}, 8000);
						}
					})
					.catch(e => console.error("Audio Error:", e));
			}

			// Update UI state for final stage
			const clueBtn = document.getElementById('clue-btn');
			clueBtn.innerText = "NO CLUES LEFT";
			clueBtn.disabled = true;
			clueBtn.style.opacity = "0.5";
			
			document.getElementById('reveal-btn').style.display = "block";
			document.getElementById('pts-display').innerText = pointsPossible;
		}

    function checkGuess() {
        let userGuess = document.getElementById('user-guess').value.toLowerCase().trim();
        let correctSong = currentSongData.Song.toLowerCase();
        let correctArtist = currentSongData.Artist.toLowerCase();
        const feedback = document.getElementById('feedback-text');
        if (userGuess.length < 2) return;

        const superClean = (str) => str ? str.toLowerCase().replace(/[^a-z0-9]/g, '').trim() : "";
        const cleanUser = superClean(userGuess);
        const cleanSong = superClean(correctSong);
        const cleanArtist = superClean(correctArtist);

        if (cleanUser.includes(cleanSong) || cleanSong.includes(cleanUser) || cleanUser.includes(cleanArtist)) {
            score += pointsPossible;
            streak++;
            feedback.innerText = `✅ CORRECT! +${pointsPossible} PTS`;
            feedback.style.color = "#10b981";
            showFullReveal();
            document.getElementById('clue-btn').style.display = "none";
            document.getElementById('reveal-btn').style.display = "none";
            document.getElementById('next-btn').style.display = "block";
        } else {
            feedback.innerText = "❌ NOPE. TRY AGAIN OR TAKE A CLUE.";
            feedback.style.color = "#ef4444";
        }
        document.getElementById('player-score').innerText = score;
        document.getElementById('player-streak').innerText = streak;
    }

    function giveUp() {
        showFullReveal();
        pointsPossible = 0;
        document.getElementById('feedback-text').innerText = "MISSION ABORTED. ANSWER REVEALED.";
        document.getElementById('feedback-text').style.color = "#94a3b8"; 
        document.getElementById('player-streak').innerText = streak;
        document.getElementById('clue-btn').style.display = "none";
        document.getElementById('reveal-btn').style.display = "none";
        document.getElementById('next-btn').style.display = "block";
    }

    function showFullReveal() {
        ['stage-2', 'stage-3', 'answer-box'].forEach(id => {
            document.getElementById(id).classList.remove('hidden');
            document.getElementById(id).style.opacity = 1;
        });
        document.getElementById('submit-btn').disabled = true;
    }

    window.onload = loadNewSong;
</script>
</body>
</html>
